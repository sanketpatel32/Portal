# AuraFlow Portal — verify pipeline (lint · build)
#
# Runs on EVERY push and PR. Lightweight: install deps, then build the client
# (Vite) + server bundle (bun build). The build is the real compile gate — it
# catches broken imports, missing exports, and type-transpile errors without
# blocking on pre-existing biome/tsc debt.
#
# Runs on the laptop agent (label: role=laptop), local backend (no Docker).
# With the local backend, `image: bash` just selects the shell — commands
# execute directly on the host in a temp clone.

when:
  - event: [push, pull_request]

labels:
  role: laptop

steps:
  install:
    image: bash
    commands:
      - bun install --frozen-lockfile

  build:
    image: bash
    commands:
      - bun run build
