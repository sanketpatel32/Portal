# AuraFlow Portal — verify pipeline (build gate)
#
# Runs on EVERY push and PR. Lightweight: install deps, then build the client
# (Vite) + server bundle (bun build). The build is the real compile gate.
#
# VPS-NATIVE: runs on the VPS agent (label: role=vps), local backend.

when:
  - event: [push, pull_request]

labels:
  role: vps

steps:
  install:
    image: bash
    commands:
      - bun install --frozen-lockfile

  build:
    image: bash
    commands:
      - bun run build
