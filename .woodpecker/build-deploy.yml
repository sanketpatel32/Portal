# AuraFlow Portal — build + deploy (single workflow, push to main only)
#
# WHY ONE FILE: Woodpecker runs each .woodpecker/*.yml as a SEPARATE workflow
# with its OWN workspace (temp dir). Artifacts do NOT transfer between
# workflows. So build + stage + activate must live in one workflow.
#
# VPS-NATIVE: the agent runs ON the server (label: role=vps), local backend.
# No SSH, no rsync, no deploy secrets — the agent builds on the box and stages
# the artifact directly into /opt/auraflow-release-incoming/, then runs the
# activate script locally. The only "secret" is filesystem + sudoers perms
# granted to the woodpecker-agent user.
#
# Pipeline (all steps share one workspace):
#   install → build → stage → activate
#
# verify.yml runs separately (build-only) and needs no artifact.
#
# Local backend: `image: bash` = run on host shell, no Docker.

when:
  - event: push
    branch: main

labels:
  role: vps

steps:
  install:
    image: bash
    commands:
      - bun install --frozen-lockfile

  build:
    image: bash
    commands:
      - bun run build

  stage:
    # Stage a minimal deploy artifact directly into the incoming dir. The Portal
    # server is a single self-contained bun-build bundle (all deps inlined),
    # so NO node_modules ships — just the bundle + client/dist.
    image: bash
    commands:
      - |
        set -euo pipefail
        INCOMING="/opt/auraflow-release-incoming"
        rm -rf "$INCOMING"/*
        mkdir -p "$INCOMING/server/dist" "$INCOMING/client" "$INCOMING/deploy"
        cp server/dist/index.js "$INCOMING/server/dist/index.js"
        cp -r client/dist "$INCOMING/client/dist"
        cp deploy/vps-deploy.sh "$INCOMING/deploy/"
        echo "=== staged artifact size ==="
        du -sh "$INCOMING"

  activate:
    # Run the activate script locally (the agent IS on the VPS). It preserves
    # server/.env, swaps incoming → active atomically, and restarts the service.
    image: bash
    commands:
      - bash /opt/auraflow-release-incoming/deploy/vps-deploy.sh
